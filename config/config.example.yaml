# sim-monitor app configuration.
# On the Pi this lives at /etc/sim-monitor/config.yaml.
# Copy this file and adjust; the real config.yaml is gitignored.

web:
  host: 0.0.0.0        # LAN-only deployment assumed; do not expose publicly (no auth in v1)
  port: 8080

daemon:
  tick_seconds: 5
  connect_timeout_seconds: 90
  # Roaming SIMs (Hologram) can take minutes to register, especially after a
  # modem reset -- the daemon waits this long before recovery kicks in.
  registration_timeout_seconds: 300
  # After the recovery ladder is exhausted on the matched profile, try a
  # built-in default (APN "hologram") as a last-ditch catch-all. false = strict.
  fallback_to_default_profile: true
  # If the modem comes up on a legacy PPP link (ppp0) instead of the native
  # wwan/QMI netdev -- where the gateway is usually 0.0.0.0 and cellular can't
  # win the default route -- reset it to recover native mode. Bounded by
  # ppp_reset_max_attempts; past the cap the PPP link is accepted to stay online.
  reset_on_ppp_interface: true
  ppp_reset_max_attempts: 2

# Per-interface latency + packet-loss monitor (ICMP ping). Pings each up
# interface (cellular + any wifi/ethernet) against the targets every interval,
# so the Latency tab can show whether a problem is cellular-only or systemic.
# Raw samples roll up into hourly/daily aggregates for ~30-day review.
#
# This block is the boot/default. Once you save settings from the Latency tab
# they're stored in the device DB and OVERRIDE this block (and hot-reload on the
# next cycle, no restart). Edit here for headless/fleet provisioning.
latency:
  enabled: false             # set true to start probing
  interval_seconds: 60       # raise to throttle (e.g. 300 = every 5 min)
  targets:                   # major public DNS anycast IPs
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
    - 8.8.4.4
    - 9.9.9.9
  packet_count: 5            # pings per target per cycle (loss granularity)
  timeout_seconds: 2
  interfaces: []             # [] = auto-enumerate every up interface each cycle
  exclude_interfaces: []     # names to skip (e.g. a busy management bridge)
  raw_retention_days: 7      # keep per-cycle samples this long
  rollup_retention_days: 30  # keep hourly/daily aggregates this long
  # Optional: pin chart colors per interface so they match across your fleet.
  # Unset interfaces get a stable color derived from their name. "#rrggbb".
  interface_colors: {}       # e.g. {wwan0: "#f59e0b", eth0: "#22c55e", wlan0: "#3b82f6"}

# Per-interface HTTP/website reachability monitor (the "Web checks" panel on the
# Latency tab). Independent of the ICMP monitor above, with its own storage. Each
# cycle it GETs every URL from every up interface (bound to that interface),
# times the request, and records the status code; status < 400 = success. HTTP
# checks prove real end-to-end web reachability even when a carrier blocks ICMP.
http_checks:
  enabled: false
  interval_seconds: 60
  targets:                   # http(s):// URLs (generate_204-style is ideal)
    - https://google.com/generate_204
  timeout_seconds: 10        # per-request timeout
  interfaces: []             # [] = auto-enumerate every up interface each cycle
  exclude_interfaces: []
  raw_retention_days: 7
  rollup_retention_days: 30
  interface_colors: {}

# Traffic audit: record every conntrack flow (inbound, outbound, forwarded —
# any interface) with endpoints, protocol, and byte/packet counts, so "did this
# device talk to IP X on port Y, and how much" is always answerable from the
# Traffic tab / API. Flow accounting, not packet capture: payloads are never
# stored, and overhead is negligible. Needs the conntrack + nftables packages
# (install.sh installs them); the daemon enables kernel flow accounting itself.
traffic:
  enabled: true
  snapshot_interval_seconds: 30   # how often live (unclosed) flows are checkpointed
  retention_days: 30
  max_flows: 200000               # hard row cap (oldest closed flows pruned first)
  include_local: false            # also record loopback / host-internal chatter

log_level: INFO

# SQLite database for events + monitor history.
# Pi: /var/lib/sim-monitor/sim-monitor.db   Dev: a local relative path is fine.
db_path: sim-monitor.db

# Directory of profile YAML files (one profile per file, loaded in sorted filename order).
# Pi: /etc/sim-monitor/profiles.d
profiles_dir: config/profiles.d

# true = run against a fake modem + fake network backend (no hardware needed).
# The --simulate CLI flag overrides this to true.
simulate: false
