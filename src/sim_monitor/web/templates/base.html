<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sim-monitor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <span class="brand">sim-monitor</span>
  <a href="{{ url_for('status.dashboard') }}">Dashboard</a>
  <a href="{{ url_for('profiles.list_profiles') }}">Profiles</a>
  <a href="{{ url_for('logs.monitor') }}">Heartbeats</a>
  <a href="{{ url_for('timeline.page') }}">Timeline</a>
  <a href="{{ url_for('logs.events') }}">Events</a>
  <a href="{{ url_for('diagnostics.page') }}">Diagnostics</a>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
